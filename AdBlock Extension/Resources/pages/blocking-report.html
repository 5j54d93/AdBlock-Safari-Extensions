<!DOCTYPE html>
<html id="adblock-blocking-report" class="desktop">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark" />
<link rel="stylesheet" href="../styles/default.css">
<link rel="stylesheet" href="../styles/common.css">
<link rel="stylesheet" href="../styles/blocking-report.css">
<title>完整封鎖紀錄 - AdBlock</title>
</head>

<body>

<header class="report-header">
    <div class="report-title">
        <p>AdBlock</p>
        <h1>完整封鎖紀錄</h1>
        <span id="reportContext">正在讀取目前網站的紀錄。</span>
    </div>
    <div class="report-actions">
        <button id="exportDiagnostics" class="report-action" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <path d="M7 10l5 5 5-5"/>
                <path d="M12 15V3"/>
            </svg>
            <span>匯出診斷</span>
        </button>
        <button id="refreshReport" class="report-action" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 12a8 8 0 1 1-2.35-5.65"/>
                <path d="M20 4.5v5h-5"/>
            </svg>
            <span>重新整理</span>
        </button>
    </div>
</header>

<main>
    <section class="summary-grid" aria-label="封鎖摘要">
        <div class="summary-item">
            <span>近期處理項目</span>
            <strong id="summaryMatches">—</strong>
        </div>
        <div class="summary-item">
            <span>DNR 封鎖</span>
            <strong id="summaryDnrMatches">—</strong>
        </div>
        <div class="summary-item">
            <span>頁面處理</span>
            <strong id="summaryPageActivity">—</strong>
        </div>
        <div class="summary-item">
            <span>最近時間</span>
            <strong id="summaryLatest">—</strong>
        </div>
    </section>

    <section class="report-section" aria-labelledby="recentMatchesTitle">
        <div class="section-heading">
            <div>
                <h2 id="recentMatchesTitle">DNR 封鎖明細</h2>
                <p id="reportWindow">最近 30 分鐘</p>
            </div>
            <p id="reportUpdated">—</p>
        </div>

        <div id="emptyState" class="empty-state" hidden>
            <strong>目前沒有可顯示的封鎖紀錄</strong>
            <span>Safari 只會回傳目前可讀取的近期封鎖資料。</span>
        </div>

        <div id="reportTableWrap" class="table-wrap" hidden>
            <table>
                <thead>
                    <tr>
                        <th scope="col">時間</th>
                        <th scope="col">來源</th>
                        <th scope="col">規則 ID</th>
                    </tr>
                </thead>
                <tbody id="reportRows"></tbody>
            </table>
        </div>
    </section>

    <section class="report-section" aria-labelledby="pageActivityTitle">
        <div class="section-heading">
            <div>
                <h2 id="pageActivityTitle">頁面處理紀錄</h2>
                <p id="activityWindow">最近 30 分鐘</p>
            </div>
            <p id="activityUpdated">—</p>
        </div>

        <div id="activityEmptyState" class="empty-state" hidden>
            <strong>最近沒有頁面處理紀錄</strong>
            <span>這裡會顯示由 content script 直接清理的廣告版位或贊助內容。</span>
        </div>

        <div id="activityTableWrap" class="table-wrap" hidden>
            <table>
                <thead>
                    <tr>
                        <th scope="col">時間</th>
                        <th scope="col">類型</th>
                        <th scope="col">處理數</th>
                    </tr>
                </thead>
                <tbody id="activityRows"></tbody>
            </table>
        </div>
    </section>
</main>

<script src="../js/ui/theme.js" type="module"></script>
<script src="../js/ui/blocking-report.js" type="module"></script>

</body>

</html>
